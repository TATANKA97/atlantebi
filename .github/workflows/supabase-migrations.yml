name: Supabase Migrations

on:
  push:
    branches: ["main"]
    paths:
      - "supabase/migrations/**"
      - "supabase/config.toml"
      - ".github/workflows/supabase-migrations.yml"
  workflow_dispatch:

concurrency:
  group: supabase-migrations-main
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    env:
      SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
      SUPABASE_DB_PASSWORD: ${{ secrets.SUPABASE_DB_PASSWORD }}
      SUPABASE_PROJECT_REF: ${{ vars.SUPABASE_PROJECT_REF }}
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v5
        with:
          node-version: "24"
          package-manager-cache: false

      - name: Validate Supabase configuration
        shell: bash
        run: |
          test -n "$SUPABASE_ACCESS_TOKEN"
          test -n "$SUPABASE_DB_PASSWORD"
          test -n "$SUPABASE_PROJECT_REF"

      - name: Link Supabase project
        run: npx -y supabase@2.104.0 link --project-ref "$SUPABASE_PROJECT_REF" --password "$SUPABASE_DB_PASSWORD"

      - name: Show migration status before deploy
        run: npx -y supabase@2.104.0 migration list --linked --password "$SUPABASE_DB_PASSWORD"

      - name: Push pending migrations
        run: npx -y supabase@2.104.0 db push --linked --password "$SUPABASE_DB_PASSWORD" --yes

      - name: Show migration status after deploy
        run: npx -y supabase@2.104.0 migration list --linked --password "$SUPABASE_DB_PASSWORD"

name: Supabase Migrations

on:
  workflow_run:
    workflows: ["CI"]
    branches: ["main"]
    types: [completed]

concurrency:
  group: supabase-migrations-main
  cancel-in-progress: false

jobs:
  deploy:
    if: github.event.workflow_run.conclusion == 'success'
    runs-on: ubuntu-latest
    environment: production
    env:
      SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
      SUPABASE_DB_PASSWORD: ${{ secrets.SUPABASE_DB_PASSWORD }}
      SUPABASE_PROJECT_REF: ${{ vars.SUPABASE_PROJECT_REF }}
    steps:
      - uses: actions/checkout@v5
        with:
          ref: ${{ github.event.workflow_run.head_sha }}

      - name: Verify triggering SHA is current main
        run: |
          CURRENT_MAIN_SHA="$(git ls-remote origin refs/heads/main | cut -f1)"
          test "${CURRENT_MAIN_SHA}" = "${{ github.event.workflow_run.head_sha }}"

      - uses: actions/setup-node@v5
        with:
          node-version: "24"
          package-manager-cache: false

      - name: Validate Supabase configuration
        shell: bash
        run: |
          test -n "$SUPABASE_ACCESS_TOKEN"
          test -n "$SUPABASE_DB_PASSWORD"
          test -n "$SUPABASE_PROJECT_REF"

      - name: Link Supabase project
        run: npx -y supabase@2.104.0 link --project-ref "$SUPABASE_PROJECT_REF" --password "$SUPABASE_DB_PASSWORD"

      - name: Show migration status before deploy
        run: npx -y supabase@2.104.0 migration list --linked --password "$SUPABASE_DB_PASSWORD"

      - name: Push pending migrations
        run: npx -y supabase@2.104.0 db push --linked --password "$SUPABASE_DB_PASSWORD" --yes

      - name: Show migration status after deploy
        run: npx -y supabase@2.104.0 migration list --linked --password "$SUPABASE_DB_PASSWORD"

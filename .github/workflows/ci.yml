name: CI

on:
  push:
    branches: ["main"]
  pull_request:

jobs:
  web-and-packages:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 10.32.1
      - uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: "pnpm"
      - run: pnpm install --frozen-lockfile
      - run: pnpm lint
      - run: pnpm typecheck
      - run: pnpm test
      - run: pnpm build

  query-engine:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"
          cache-dependency-path: services/query-engine/requirements-dev.txt
      - run: python -m pip install -r services/query-engine/requirements-dev.txt
      - run: python -m pytest services/query-engine/tests
      - run: docker build -t atlantebi-query-engine services/query-engine

name: CI

on:
  push:
    branches: ["main"]
  pull_request:

jobs:
  web-and-packages:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: pnpm/action-setup@v6
        with:
          version: 10.32.1
      - uses: actions/setup-node@v5
        with:
          node-version: "24"
          cache: "pnpm"
      - run: pnpm install --frozen-lockfile
      - run: pnpm lint
      - run: pnpm typecheck
      - run: pnpm test
      - run: pnpm build

  query-engine:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: "pip"
          cache-dependency-path: services/query-engine/requirements-dev.txt
      - run: python -m pip install -r requirements-dev.txt
        working-directory: services/query-engine
      - run: python -m pytest
        working-directory: services/query-engine
      - run: docker build -t atlantebi-query-engine .
        working-directory: services/query-engine

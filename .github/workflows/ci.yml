name: CI

on:
  push:
    branches: ["main"]
  pull_request:

jobs:
  database:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5
      - uses: actions/setup-node@a0853c24544627f65ddf259abe73b1d18a591444 # v5
        with:
          node-version: "24"
          package-manager-cache: false
      - run: npx -y supabase@2.104.0 start
      - name: Verify legacy demo snapshot upgrade
        shell: bash
        run: |
          npx -y supabase@2.104.0 db reset --local --version 20260611140354
          docker exec -i supabase_db_atlantebi psql -v ON_ERROR_STOP=1 -U postgres \
            < .github/fixtures/legacy-queryability-upgrade.sql
          npx -y supabase@2.104.0 migration up --local
          test "$(
            docker exec supabase_db_atlantebi psql -At -U postgres \
              -c "select count(*) from public.schema_snapshots where tenant_id = '20000000-0000-4000-8000-000000000003';"
          )" = "0"
          test "$(
            docker exec supabase_db_atlantebi psql -At -U postgres \
              -c "select count(*) from public.semantic_versions where tenant_id = '20000000-0000-4000-8000-000000000003';"
          )" = "0"
          test "$(
            docker exec supabase_db_atlantebi psql -At -U postgres \
              -c "select to_regclass('public.queryability_graph_versions') is not null;"
          )" = "t"
      - run: npx -y supabase@2.104.0 db reset --local
      - run: npx -y supabase@2.104.0 test db
      - name: Verify concurrent graph import deduplication
        shell: bash
        run: |
          docker exec -i supabase_db_atlantebi psql -v ON_ERROR_STOP=1 -U postgres \
            < .github/fixtures/concurrent-schema-imports.sql
          docker exec supabase_db_atlantebi psql -At -U postgres \
            -c "select public.hardening_test_concurrent_import();" > /tmp/import-1 &
          first_pid=$!
          docker exec supabase_db_atlantebi psql -At -U postgres \
            -c "select public.hardening_test_concurrent_import();" > /tmp/import-2 &
          second_pid=$!
          wait "$first_pid"
          wait "$second_pid"
          test "$(cat /tmp/import-1 /tmp/import-2 | sort -n | tr '\n' ' ')" = "1 1 "
          test "$(
            docker exec supabase_db_atlantebi psql -At -U postgres \
              -c "select count(*) from public.schema_snapshots where connection_id = '30000000-0000-4000-8000-000000000002';"
          )" = "1"
          test "$(
            docker exec supabase_db_atlantebi psql -At -U postgres \
              -c "select count(*) from public.queryability_graph_versions where connection_id = '30000000-0000-4000-8000-000000000002';"
          )" = "1"
      - if: always()
        run: npx -y supabase@2.104.0 stop --no-backup

  web-and-packages:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5
      - uses: pnpm/action-setup@0e279bb959325dab635dd2c09392533439d90093 # v6
        with:
          version: 10.32.1
      - uses: actions/setup-node@a0853c24544627f65ddf259abe73b1d18a591444 # v5
        with:
          node-version: "24"
          cache: "pnpm"
      - run: pnpm install --frozen-lockfile
      - run: pnpm lint
      - run: pnpm typecheck
      - run: pnpm test
      - run: pnpm build
      - run: docker build -f apps/web/Dockerfile -t atlantebi-web .

  query-engine:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5
      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6
        with:
          python-version: "3.12"
          cache: "pip"
          cache-dependency-path: services/query-engine/requirements-dev.txt
      - run: python -m pip install -r requirements-dev.txt
        working-directory: services/query-engine
      - run: python -m pytest
        working-directory: services/query-engine
      - name: Build query-engine integration test image
        run: docker build --target test -t atlantebi-query-engine-test .
        working-directory: services/query-engine
      - name: Start SQL Server fixture
        run: |
          docker network create atlantebi-integration
          docker run -d \
            --name atlantebi-sqlserver \
            --network atlantebi-integration \
            -e ACCEPT_EULA=Y \
            -e MSSQL_SA_PASSWORD='Fixture-SA-Password-42!' \
            mcr.microsoft.com/mssql/server:2022-latest
          for attempt in $(seq 1 60); do
            if docker exec atlantebi-sqlserver /opt/mssql-tools18/bin/sqlcmd \
              -S localhost -U sa -P 'Fixture-SA-Password-42!' -C -Q 'select 1' >/dev/null 2>&1; then
              exit 0
            fi
            sleep 2
          done
          docker logs atlantebi-sqlserver
          exit 1
      - name: Initialize SQL Server fixture
        run: |
          docker cp tests/fixtures/sqlserver_snapshot_v1.sql atlantebi-sqlserver:/tmp/fixture.sql
          docker exec atlantebi-sqlserver /opt/mssql-tools18/bin/sqlcmd -b \
            -S localhost -U sa -P 'Fixture-SA-Password-42!' -C \
            -i /tmp/fixture.sql
        working-directory: services/query-engine
      - name: Run real SQL Server introspection test
        run: |
          docker run --rm \
            --network atlantebi-integration \
            -e SQLSERVER_INTEGRATION_HOST=atlantebi-sqlserver \
            -e QUERY_ENGINE_ALLOW_PRIVATE_NETWORKS=true \
            atlantebi-query-engine-test \
            python -m pytest tests/test_sqlserver_integration.py
      - run: docker build -t atlantebi-query-engine .
        working-directory: services/query-engine
      - if: always()
        run: |
          docker rm -f atlantebi-sqlserver || true
          docker network rm atlantebi-integration || true

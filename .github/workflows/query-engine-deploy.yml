name: Deploy Query Engine

on:
  workflow_run:
    workflows: ["CI"]
    branches: ["main"]
    types: [completed]

permissions:
  contents: read
  id-token: write

concurrency:
  group: query-engine-production
  cancel-in-progress: true

jobs:
  deploy:
    if: github.event.workflow_run.conclusion == 'success'
    runs-on: ubuntu-latest
    environment: production
    env:
      GCP_PROJECT_ID: business-intelligence-495312
      GCP_REGION: us-central1
      ARTIFACT_REPOSITORY: atlantebi
      SERVICE_NAME: query-engine
      RUNTIME_SERVICE_ACCOUNT: query-engine-runtime@business-intelligence-495312.iam.gserviceaccount.com
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5
        with:
          ref: ${{ github.event.workflow_run.head_sha }}

      - name: Verify triggering SHA is current main
        run: |
          CURRENT_MAIN_SHA="$(git ls-remote origin refs/heads/main | cut -f1)"
          test "${CURRENT_MAIN_SHA}" = "${{ github.event.workflow_run.head_sha }}"

      - uses: google-github-actions/auth@7c6bc770dae815cd3e89ee6cdf493a5fab2cc093 # v3
        with:
          workload_identity_provider: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ secrets.GCP_DEPLOY_SERVICE_ACCOUNT }}

      - uses: google-github-actions/setup-gcloud@aa5489c8933f4cc7a4f7d45035b3b1440c9c10db # v3

      - run: gcloud auth configure-docker "${GCP_REGION}-docker.pkg.dev" --quiet

      - name: Build and push image
        run: |
          IMAGE="${GCP_REGION}-docker.pkg.dev/${GCP_PROJECT_ID}/${ARTIFACT_REPOSITORY}/${SERVICE_NAME}:${{ github.event.workflow_run.head_sha }}"
          docker build -t "${IMAGE}" services/query-engine
          docker push "${IMAGE}"
          echo "IMAGE=${IMAGE}" >> "${GITHUB_ENV}"

      - name: Deploy private Cloud Run service
        run: |
          gcloud run deploy "${SERVICE_NAME}" \
            --project="${GCP_PROJECT_ID}" \
            --region="${GCP_REGION}" \
            --image="${IMAGE}" \
            --service-account="${RUNTIME_SERVICE_ACCOUNT}" \
            --port=8080 \
            --no-allow-unauthenticated \
            --ingress=all \
            --network=default \
            --subnet=default \
            --vpc-egress=private-ranges-only \
            --set-env-vars="QUERY_ENGINE_AUTH_MODE=cloud_run_iam,QUERY_ENGINE_ALLOW_PRIVATE_NETWORKS=false,GCP_PROJECT_ID=${GCP_PROJECT_ID}" \
            --timeout=180s \
            --max-instances=10 \
            --quiet

      - name: Resolve deployed service URL
        id: service
        run: |
          SERVICE_URL="$(gcloud run services describe "${SERVICE_NAME}" --project="${GCP_PROJECT_ID}" --region="${GCP_REGION}" --format='value(status.url)')"
          echo "url=${SERVICE_URL}" >> "${GITHUB_OUTPUT}"

      - name: Mint Cloud Run ID token
        id: smoke-auth
        uses: google-github-actions/auth@7c6bc770dae815cd3e89ee6cdf493a5fab2cc093 # v3
        with:
          workload_identity_provider: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ secrets.GCP_DEPLOY_SERVICE_ACCOUNT }}
          token_format: id_token
          id_token_audience: ${{ steps.service.outputs.url }}

      - name: Authenticated smoke test
        run: |
          curl --fail --silent --show-error \
            -H "Authorization: Bearer ${{ steps.smoke-auth.outputs.id_token }}" \
            "${{ steps.service.outputs.url }}/health"

name: Deploy Query Engine

on:
  workflow_run:
    workflows: ["CI"]
    branches: ["main"]
    types: [completed]

permissions:
  contents: read
  id-token: write

jobs:
  deploy:
    if: github.event.workflow_run.conclusion == 'success'
    runs-on: ubuntu-latest
    environment: production
    env:
      GCP_PROJECT_ID: business-intelligence-495312
      GCP_REGION: us-central1
      ARTIFACT_REPOSITORY: atlantebi
      SERVICE_NAME: query-engine
      RUNTIME_SERVICE_ACCOUNT: query-engine-runtime@business-intelligence-495312.iam.gserviceaccount.com
      DEPLOY_SERVICE_ACCOUNT: ${{ secrets.GCP_DEPLOY_SERVICE_ACCOUNT }}
    steps:
      - uses: actions/checkout@v5
        with:
          ref: ${{ github.event.workflow_run.head_sha }}

      - uses: google-github-actions/auth@v3
        with:
          workload_identity_provider: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ secrets.GCP_DEPLOY_SERVICE_ACCOUNT }}

      - uses: google-github-actions/setup-gcloud@v3

      - run: gcloud auth configure-docker "${GCP_REGION}-docker.pkg.dev" --quiet

      - name: Build and push image
        run: |
          IMAGE="${GCP_REGION}-docker.pkg.dev/${GCP_PROJECT_ID}/${ARTIFACT_REPOSITORY}/${SERVICE_NAME}:${{ github.event.workflow_run.head_sha }}"
          docker build -t "${IMAGE}" services/query-engine
          docker push "${IMAGE}"
          echo "IMAGE=${IMAGE}" >> "${GITHUB_ENV}"

      - name: Deploy private Cloud Run service
        run: |
          gcloud run deploy "${SERVICE_NAME}" \
            --project="${GCP_PROJECT_ID}" \
            --region="${GCP_REGION}" \
            --image="${IMAGE}" \
            --service-account="${RUNTIME_SERVICE_ACCOUNT}" \
            --port=8080 \
            --no-allow-unauthenticated \
            --ingress=all \
            --network=default \
            --subnet=default \
            --vpc-egress=private-ranges-only \
            --set-env-vars="QUERY_ENGINE_AUTH_MODE=cloud_run_iam" \
            --timeout=180s \
            --max-instances=10 \
            --quiet

      - name: Authenticated smoke test
        run: |
          SERVICE_URL="$(gcloud run services describe "${SERVICE_NAME}" --project="${GCP_PROJECT_ID}" --region="${GCP_REGION}" --format='value(status.url)')"
          ID_TOKEN="$(gcloud auth print-identity-token --impersonate-service-account="${DEPLOY_SERVICE_ACCOUNT}" --audiences="${SERVICE_URL}")"
          curl --fail --silent --show-error -H "Authorization: Bearer ${ID_TOKEN}" "${SERVICE_URL}/health"
